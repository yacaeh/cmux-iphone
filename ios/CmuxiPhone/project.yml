name: CmuxiPhone
options:
  # Maintainer's reverse-DNS namespace. Forkers: run scripts/configure-ios.sh
  # with your own id, and set your Team in Xcode (Signing & Capabilities).
  bundleIdPrefix: com.limseungwon
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ONLY_ACTIVE_ARCH: true
    # ONE knob for the whole app's identity. The iPhone id, the Watch id
    # (<id>.watchkitapp), and the Watch's WKCompanionAppBundleIdentifier all
    # derive from this — change it in one place (or run scripts/configure-ios.sh).
    # DEVELOPMENT_TEAM is intentionally NOT set here so no personal signing
    # identity is committed — set yours in Xcode (it stays a local change).
    CMUX_IPHONE_BUNDLE_ID: com.limseungwon.cmuxiphone

targets:
  CmuxiPhone:
    type: application
    platform: iOS
    sources:
      - path: "CmuxiPhone iOS"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(CMUX_IPHONE_BUNDLE_ID)
        INFOPLIST_FILE: "CmuxiPhone iOS/Info.plist"
        PRODUCT_NAME: Cmux iPhone
        GENERATE_INFOPLIST_FILE: false
    dependencies:
      - target: CmuxiPhoneWatch
        embed: true

  CmuxiPhoneWatch:
    type: application
    platform: watchOS
    sources:
      - path: "CmuxiPhone watchOS"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(CMUX_IPHONE_BUNDLE_ID).watchkitapp
        INFOPLIST_FILE: "CmuxiPhone watchOS/Info.plist"
        # Distinct from the iOS app's "Cmux iPhone" — two targets producing the
        # same .app name caused "Multiple commands produce …/Cmux iPhone.app".
        PRODUCT_NAME: Cmux iPhone Watch App
        GENERATE_INFOPLIST_FILE: false
        SUPPORTS_MACCATALYST: false
        ARCHS: "arm64 arm64e arm64_32"
        "EXCLUDED_ARCHS[sdk=watchsimulator*]": arm64e

schemes:
  CmuxiPhone:
    build:
      targets:
        CmuxiPhone: all
        CmuxiPhoneWatch: all
    run:
      config: Debug
  CmuxiPhoneWatch:
    build:
      targets:
        CmuxiPhoneWatch: all
    run:
      config: Debug
      executable: CmuxiPhoneWatch
